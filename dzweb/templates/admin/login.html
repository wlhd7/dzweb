{% extends 'base.html' %}

{% block title %}{{ _('管理员登录') }}{% endblock %}

{% block content %}
<div>
	<h2>{{ _('管理员登录') }}</h2>

	<form method="post">
		<label for="password">{{ _('管理员密码') }}</label>
		<input name="password" type="password" required>

		<input type="submit" value="{{ _('登录') }}">
	</form>

	{% if error %}
	<p>{{ _('管理员密码错误') }}</p>
	{% endif %}
</div>
{% endblock %}
